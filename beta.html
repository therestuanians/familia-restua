<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Teammates</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
	body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Montserrat', sans-serif;
}

.container {
    position: relative;
    text-align: center;
    color: white;
}

.background {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: brightness(50%);
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3em;
    margin: 0;
}

p {
    font-size: 1.5em;
    margin: 10px 0 0;
}

	</style>
</head>
<body>
    <div class="container">
        <img src="bgphoto.png" alt="the restuanians" class="background">
        <div class="overlay">
            <h1>WELCOME TEAMMATES</h1>
            <p>A new face will come soon</p>
        </div>
    </div>
</body>
</html>
